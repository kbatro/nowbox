<!DOCTYPE html>
<html>
<head>
<title>nowbox</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  body { background:#111; color:#eee; font-family:monospace; margin:0; padding:0; display:flex; flex-direction:column; height:100vh; }
  #header { padding:8px 16px; display:flex; align-items:center; gap:16px; border-bottom:1px solid #333; flex-shrink:0; }
  #header h2 { margin:0; font-size:14px; }
  #status { font-size:12px; }
  #terminal-container { flex:1; overflow:hidden; }
  #log { font-size:11px; padding:4px 16px; max-height:100px; overflow-y:auto; border-top:1px solid #333; color:#888; flex-shrink:0; }
  .hidden { display:none; }
</style>
</head>
<body>
<div id="header">
  <h2>nowbox</h2>
  <span id="status" style="color:#ff0">◌ connecting...</span>
</div>
<div id="terminal-container" class="hidden"></div>
<pre id="log"></pre>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>

<script>
// -- Non-module globals (xterm.js loaded above) --
var term = null;
var fitAddon = null;
var dataChannel = null;

function b64encode(bytes) {
  var binary = '';
  for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}
function b64decode(str) {
  var binary = atob(str);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

function showTerminal() {
  document.getElementById('terminal-container').classList.remove('hidden');
  document.getElementById('log').classList.add('hidden');

  term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: 'Menlo, Monaco, "Courier New", monospace',
    theme: { background: '#111', foreground: '#eee' }
  });
  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal-container'));

  setTimeout(function() {
    fitAddon.fit();
    sendResize();
  }, 100);

  term.onData(function(data) {
    if (!dataChannel || dataChannel.readyState !== 'open') return;
    var encoded = b64encode(new TextEncoder().encode(data));
    dataChannel.send(JSON.stringify({ type: 'cli', data: encoded }));
  });

  window.addEventListener('resize', function() {
    if (fitAddon) fitAddon.fit();
    sendResize();
  });
}

function sendResize() {
  if (!dataChannel || dataChannel.readyState !== 'open' || !term) return;
  dataChannel.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
}

function onDataChannelMessage(e) {
  var msg;
  try { msg = JSON.parse(e.data); } catch(err) { return; }
  if (msg.type === 'cli' && msg.data && term) {
    term.write(b64decode(msg.data));
  } else if (msg.type === 'status') {
    log('server: ' + msg.stage);
  }
}

function onDataChannelOpen() {
  log('DataChannel open');
  setStatus('● connected (p2p)', '#0f0');
  showTerminal();
}
</script>

<script type="module">
import { schnorr, secp256k1 } from 'https://esm.sh/@noble/curves@1.8.2/secp256k1';

// -- Config --
const SECRET = 'nowbox-1775167853';
const RELAYS = ['wss://nos.lol', 'wss://relay.damus.io'];
const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];

// -- State --
let pc = null;
let relayConns = [];
let privkey, pubkey, topic;
let publishedIds = new Set();

// -- Helpers --
const log = (s) => { document.getElementById('log').textContent += s + '\n'; };
const setStatus = (s, color) => {
  document.getElementById('status').textContent = s;
  document.getElementById('status').style.color = color || '#ff0';
};
window.log = log;
window.setStatus = setStatus;

function toHex(bytes) {
  return Array.from(new Uint8Array(bytes)).map(b => b.toString(16).padStart(2, '0')).join('');
}
function fromHex(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2) bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
  return bytes;
}
async function sha256(data) {
  const encoded = typeof data === 'string' ? new TextEncoder().encode(data) : data;
  return new Uint8Array(await crypto.subtle.digest('SHA-256', encoded));
}

// -- Nostr crypto --
async function initKeys() {
  const privBytes = await sha256(SECRET);
  privkey = toHex(privBytes);
  pubkey = toHex(secp256k1.getPublicKey(privkey, true).slice(1));
  topic = toHex(await sha256('nowbox-topic:' + SECRET));
}

async function signEvent(event) {
  const serialized = JSON.stringify([0, event.pubkey, event.created_at, event.kind, event.tags, event.content]);
  const id = toHex(await sha256(serialized));
  event.id = id;
  const sig = await schnorr.sign(fromHex(id), fromHex(privkey));
  event.sig = toHex(sig);
  return event;
}

async function nostrPublish(content) {
  const event = await signEvent({
    kind: 20100, created_at: Math.floor(Date.now() / 1000),
    tags: [['d', topic]], content: content, pubkey: pubkey
  });
  publishedIds.add(event.id);
  const msg = JSON.stringify(['EVENT', event]);
  for (const ws of relayConns) {
    if (ws.readyState === 1) ws.send(msg);
  }
}

// -- WebRTC --
let candidateQueue = [];

async function handleOffer(sdp) {
  if (pc) return;
  log('received offer (' + sdp.length + ' bytes)');
  setStatus('◌ negotiating...', '#ff0');

  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  pc.onicecandidate = async (e) => {
    if (!e.candidate) return;
    await nostrPublish(JSON.stringify({
      type: 'candidate', candidate: e.candidate.candidate,
      sdpMid: e.candidate.sdpMid || '0', sdpMLineIndex: e.candidate.sdpMLineIndex || 0
    }));
  };

  pc.onconnectionstatechange = () => {
    log('connection: ' + pc.connectionState);
    if (pc.connectionState === 'connected') setStatus('● connected (p2p)', '#0f0');
    if (pc.connectionState === 'failed') setStatus('✗ failed', '#f00');
  };

  pc.ondatachannel = (e) => {
    dataChannel = e.channel;
    dataChannel.onopen = onDataChannelOpen;
    dataChannel.onmessage = onDataChannelMessage;
    dataChannel.onclose = () => {
      log('DataChannel closed');
      setStatus('○ disconnected', '#f00');
    };
  };

  await pc.setRemoteDescription({ type: 'offer', sdp });
  for (const c of candidateQueue) await pc.addIceCandidate(c).catch(() => {});
  candidateQueue = [];

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  try {
    await nostrPublish(JSON.stringify({ type: 'answer', sdp: answer.sdp }));
    log('answer published');
  } catch (e) {
    log('ERROR: ' + e.message);
  }
}

function handleCandidate(candidate, sdpMid, sdpMLineIndex) {
  const c = { candidate, sdpMid: sdpMid || '0', sdpMLineIndex: sdpMLineIndex || 0 };
  if (!pc || !pc.remoteDescription) { candidateQueue.push(c); return; }
  pc.addIceCandidate(c).catch(() => {});
}

// -- Main --
async function main() {
  await initKeys();
  log('topic: ' + topic.slice(0, 16) + '...');

  for (const url of RELAYS) {
    const ws = new WebSocket(url);
    relayConns.push(ws);
    ws.onopen = () => {
      log('connected to ' + url);
      setStatus('◌ waiting for server...', '#ff0');
      ws.send(JSON.stringify(['REQ', 'sub1', { kinds: [20100], '#d': [topic] }]));
    };
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data[0] === 'EVENT') {
        const event = data[2];
        if (publishedIds.has(event.id)) return;
        if (event.created_at < Math.floor(Date.now() / 1000) - 30) return;
        let content;
        try { content = JSON.parse(event.content); } catch { return; }
        if (content.type === 'offer' && content.sdp) handleOffer(content.sdp);
        else if (content.type === 'candidate' && content.candidate) handleCandidate(content.candidate, content.sdpMid, content.sdpMLineIndex);
      }
    };
    ws.onerror = () => log('error on ' + url);
    ws.onclose = () => log('disconnected from ' + url);
  }
  log('waiting for server...');
}

main();
</script>
</body>
</html>
